FeedbackStudentSummary:
  type: object
  additionalProperties: false
  required: [id, name, avatar]
  properties:
    id:
      type: integer
      format: int64
      minimum: 1
      description: accounts.User primary key.
    name: {type: string}
    avatar: {type: string, format: uri, nullable: true}

FeedbackTrainerSummary:
  type: object
  additionalProperties: false
  required: [id, name]
  properties:
    id: {type: integer, format: int64, minimum: 1}
    name: {type: string}

FeedbackClassRecordSummary:
  type: object
  additionalProperties: false
  required: [id, class_date, theme, trainer]
  properties:
    id: {type: integer, format: int64, minimum: 1}
    class_date: {type: string, format: date}
    theme: {type: string}
    trainer: {$ref: '#/FeedbackTrainerSummary'}

Feedback:
  type: object
  additionalProperties: false
  required:
    - id
    - company
    - class_record
    - class_record_summary
    - student
    - feeling
    - improvement_note
    - comment
    - photos
    - is_editable
    - created_at
    - updated_at
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company: {type: integer, format: int64, minimum: 1, readOnly: true}
    class_record:
      type: integer
      format: int64
      minimum: 1
      description: ClassRecord primary key.
    class_record_summary: {$ref: '#/FeedbackClassRecordSummary'}
    student:
      allOf:
        - {$ref: '#/FeedbackStudentSummary'}
      description: Feedback owner; id is an accounts.User primary key and is inferred from authentication.
    feeling: {type: string, enum: [easy, moderate, hard]}
    improvement_note: {type: string, maxLength: 1000}
    comment: {type: string, maxLength: 2000}
    photos:
      type: array
      maxItems: 0
      items: {type: string}
      readOnly: true
      description: Always empty in Phase 10. Feedback photo upload and attachment are deferred.
    is_editable:
      type: boolean
      enum: [false]
      readOnly: true
      description: Feedback is immutable after creation in Phase 10.
    created_at: {type: string, format: date-time, readOnly: true}
    updated_at: {type: string, format: date-time, readOnly: true}

FeedbackCreateRequest:
  type: object
  additionalProperties: false
  required: [class_record, feeling]
  properties:
    class_record:
      type: integer
      format: int64
      minimum: 1
      description: Completed ClassRecord owned by the authenticated Student User.
    feeling: {type: string, enum: [easy, moderate, hard]}
    improvement_note: {type: string, maxLength: 1000, default: ''}
    comment: {type: string, maxLength: 2000, default: ''}

FeedbackSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Feedback'}

FeedbackListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/Feedback'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}

FeedbackListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/FeedbackListData'}
