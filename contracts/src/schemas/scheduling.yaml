Schedule:
  type: object
  additionalProperties: false
  required: [id, company_id, store_id, room_id, trainer_id, course_template_id, starts_at, ends_at, timezone, capacity, status]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1, readOnly: true}
    store_id: {type: integer, format: int64, minimum: 1}
    room_id: {type: integer, format: int64, minimum: 1}
    trainer_id: {type: integer, format: int64, minimum: 1}
    course_template_id: {type: integer, format: int64, minimum: 1}
    starts_at: {type: string, format: date-time}
    ends_at: {type: string, format: date-time}
    timezone: {type: string, example: Asia/Shanghai}
    capacity: {type: integer, minimum: 1}
    status: {type: string, enum: [draft, published, completed, cancelled]}
Booking:
  type: object
  additionalProperties: false
  required: [id, company_id, schedule_id, student_id, status, source, created_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1, readOnly: true}
    schedule_id: {type: integer, format: int64, minimum: 1}
    student_id: {type: integer, format: int64, minimum: 1}
    status: {type: string, enum: [pending, confirmed, cancelled, completed, no_show]}
    source: {type: string, enum: [admin, trainer, student, system]}
    created_at: {type: string, format: date-time, readOnly: true}
RecurringScheduleRequest:
  type: object
  additionalProperties: false
  required: [idempotency_key, schedule, recurrence]
  properties:
    idempotency_key: {type: string, minLength: 8, maxLength: 128}
    schedule: {$ref: '#/Schedule'}
    recurrence: {type: object, description: RFC 5545 风格重复规则；DRAFT 待冻结}
