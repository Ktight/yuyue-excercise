AdminDashboardMetrics:
  type: object
  additionalProperties: false
  required: [today_classes, today_bookings, active_students, pending_items]
  properties:
    today_classes:
      type: integer
      minimum: 0
      description: Non-cancelled schedules on the current Asia/Shanghai date.
    today_bookings:
      type: integer
      minimum: 0
      description: Booked reservations on today's included schedules.
    active_students:
      type: integer
      minimum: 0
      description: >-
        Enabled students with an enabled membership in its valid date range;
        count and stored-value memberships also require positive balance.
    pending_items:
      type: integer
      minimum: 0
      description: Current non-dismissed reminders that are unread for this user.

BookingTrendPoint:
  type: object
  additionalProperties: false
  required: [label, value]
  properties:
    label:
      type: string
      format: date
      description: Asia/Shanghai calendar date.
    value: {type: integer, minimum: 0}

TodaySchedule:
  type: object
  additionalProperties: false
  required: [id, time, course_name, trainer_name, room_name, booked, capacity]
  properties:
    id: {type: integer, format: int64, minimum: 1}
    time:
      type: string
      pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
    course_name: {type: string}
    trainer_name: {type: string}
    room_name: {type: string}
    booked: {type: integer, minimum: 0}
    capacity: {type: integer, minimum: 1}

AdminDashboardData:
  type: object
  additionalProperties: false
  required:
    - generated_at
    - timezone
    - metrics
    - booking_trend
    - today_schedules
  properties:
    generated_at: {type: string, format: date-time}
    timezone: {type: string, enum: [Asia/Shanghai]}
    metrics: {$ref: '#/AdminDashboardMetrics'}
    booking_trend:
      type: array
      minItems: 7
      maxItems: 7
      description: Seven consecutive calendar dates ending today; missing dates are zero.
      items: {$ref: '#/BookingTrendPoint'}
    today_schedules:
      type: array
      items: {$ref: '#/TodaySchedule'}

AdminDashboardSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/AdminDashboardData'}

ReminderCategory:
  type: string
  enum: [booking, attendance, membership, training, system]

ReminderPriority:
  type: string
  enum: [high, normal, low]

Reminder:
  type: object
  additionalProperties: false
  required:
    - id
    - title
    - message
    - category
    - priority
    - created_at
    - is_read
    - is_dismissed
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    title: {type: string}
    message: {type: string}
    category: {$ref: '#/ReminderCategory'}
    priority: {$ref: '#/ReminderPriority'}
    created_at:
      type: string
      format: date-time
      readOnly: true
      description: Time the per-user state for this derived reminder was first materialized.
    is_read: {type: boolean}
    is_dismissed: {type: boolean}
    action_label: {type: string}
    action_to:
      type: string
      pattern: '^/admin/(schedules|attendance|students|training-plans|class-records)(/\d+)?$'
      description: Allowlisted internal route; external and arbitrary URLs are forbidden.

ReminderListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items:
      type: array
      description: >-
        Ordered high, normal, low; then created_at descending; then ID descending.
      items: {$ref: '#/Reminder'}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}

ReminderListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ReminderListData'}

ReminderSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Reminder'}

ReminderActionRequest:
  type: object
  additionalProperties: false
  maxProperties: 0
