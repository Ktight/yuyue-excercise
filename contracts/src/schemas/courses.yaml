CourseTemplate:
  type: object
  additionalProperties: false
  required: [id, company_id, name, category, difficulty, duration_minutes, capacity, description, cover, status]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1, readOnly: true}
    name: {type: string, minLength: 1, maxLength: 100}
    category: {type: string, enum: [private, small_group, group]}
    difficulty: {type: string, enum: [beginner, intermediate, advanced, all_levels]}
    duration_minutes: {type: integer, minimum: 1, maximum: 1440}
    capacity: {type: integer, minimum: 1}
    description: {type: string, nullable: true}
    cover: {$ref: './common.yaml#/MediaResource'}
    status: {$ref: './common.yaml#/ResourceStatus'}
ClassTemplate:
  type: object
  additionalProperties: false
  required: [id, company_id, owner_id, name, scope, content_items]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1}
    owner_id: {type: integer, format: int64, minimum: 1}
    name: {type: string}
    scope: {type: string, enum: [personal, company]}
    content_items: {type: array, items: {type: object}}
