Attendance:
  type: object
  additionalProperties: false
  required: [id, company, booking, schedule, student, student_name, schedule_name, check_in_time, status, checked_by, checked_by_name, created_at, updated_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company: {type: integer, format: int64, minimum: 1, readOnly: true}
    booking: {type: integer, format: int64, minimum: 1, readOnly: true}
    schedule: {type: integer, format: int64, minimum: 1, readOnly: true}
    student: {type: integer, format: int64, minimum: 1, readOnly: true, description: "accounts.User primary key, not StudentProfile ID."}
    student_name: {type: string, readOnly: true}
    schedule_name: {type: string, readOnly: true}
    check_in_time: {type: string, format: date-time, nullable: true, readOnly: true}
    status: {type: string, enum: [present, late, absent, leave]}
    checked_by: {type: integer, format: int64, minimum: 1, nullable: true, readOnly: true}
    checked_by_name: {type: string, nullable: true, readOnly: true}
    created_at: {type: string, format: date-time, readOnly: true}
    updated_at: {type: string, format: date-time, readOnly: true}

AttendanceSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Attendance'}

AttendanceListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/Attendance'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}

AttendanceListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/AttendanceListData'}

AttendanceScheduleRequest:
  type: object
  additionalProperties: false
  required: [schedule_id]
  properties:
    schedule_id: {type: integer, format: int64, minimum: 1}

AttendanceBatchCheckInRequest:
  type: object
  additionalProperties: false
  required: [schedule_id, student_ids]
  properties:
    schedule_id: {type: integer, format: int64, minimum: 1}
    student_ids:
      type: array
      minItems: 1
      uniqueItems: true
      description: accounts.User primary keys, not StudentProfile IDs.
      items: {type: integer, format: int64, minimum: 1}

AttendanceBatchData:
  type: object
  additionalProperties: false
  required: [updated_count, items]
  properties:
    updated_count: {type: integer, minimum: 0}
    items: {type: array, items: {$ref: '#/Attendance'}}

AttendanceBatchSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/AttendanceBatchData'}

AttendanceAutoCreateData:
  type: object
  additionalProperties: false
  required: [created_count]
  properties:
    created_count: {type: integer, minimum: 0}

AttendanceAutoCreateSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/AttendanceAutoCreateData'}

StudentAttendanceStats:
  type: object
  additionalProperties: false
  required: [student_id, total_count, attended_count, attendance_rate, late_count, leave_count, consecutive_attendance]
  properties:
    student_id: {type: integer, format: int64, minimum: 1, description: "accounts.User primary key, not StudentProfile ID."}
    total_count: {type: integer, minimum: 0}
    attended_count: {type: integer, minimum: 0}
    attendance_rate: {type: number, format: float, minimum: 0, maximum: 100}
    late_count: {type: integer, minimum: 0}
    leave_count: {type: integer, minimum: 0}
    consecutive_attendance: {type: integer, minimum: 0}

CourseAttendanceStats:
  type: object
  additionalProperties: false
  required: [schedule_id, booking_count, arrived_count, attendance_rate]
  properties:
    schedule_id: {type: integer, format: int64, minimum: 1}
    booking_count: {type: integer, minimum: 0}
    arrived_count: {type: integer, minimum: 0}
    attendance_rate: {type: number, format: float, minimum: 0, maximum: 100}

AttendanceStatsData:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    student_stats: {$ref: '#/StudentAttendanceStats'}
    course_stats: {$ref: '#/CourseAttendanceStats'}

AttendanceStatsSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/AttendanceStatsData'}
PoseItem:
  type: object
  additionalProperties: false
  required: [name, duration]
  properties:
    name: {type: string, minLength: 1}
    duration: {type: integer, minimum: 1, description: Minutes.}
    notes: {type: string, default: ''}
    variations: {type: string, default: ''}
    assists: {type: string, default: ''}

PoseSequence:
  type: object
  additionalProperties: false
  required: [warmup, main, cooldown]
  properties:
    warmup: {type: array, items: {$ref: '#/PoseItem'}}
    main: {type: array, items: {$ref: '#/PoseItem'}}
    cooldown: {type: array, items: {$ref: '#/PoseItem'}}

ClassMedia:
  type: object
  additionalProperties: false
  required: [id, class_record, media_type, file_url, thumbnail_url, caption, annotations, sort_order]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    class_record: {type: integer, format: int64, minimum: 1, readOnly: true}
    media_type: {type: string, enum: [image, video]}
    file_url: {type: string, format: uri}
    thumbnail_url: {type: string, default: '', description: Empty when no thumbnail exists.}
    caption: {type: string, maxLength: 255, default: ''}
    annotations: {type: object, nullable: true, additionalProperties: true}
    sort_order: {type: integer, minimum: 0, default: 0}

ClassMediaCreateRequest:
  type: object
  additionalProperties: false
  required: [media_type, file_url]
  properties:
    media_type: {type: string, enum: [image, video]}
    file_url: {type: string, format: uri}
    thumbnail_url: {type: string, default: '', description: Empty when no thumbnail exists.}
    caption: {type: string, maxLength: 255, default: ''}
    annotations: {type: object, nullable: true, additionalProperties: true}
    sort_order: {type: integer, minimum: 0, default: 0}

ClassMediaUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    media_type: {type: string, enum: [image, video]}
    file_url: {type: string, format: uri}
    thumbnail_url: {type: string, description: Empty when no thumbnail exists.}
    caption: {type: string, maxLength: 255}
    annotations: {type: object, nullable: true, additionalProperties: true}
    sort_order: {type: integer, minimum: 0}

ClassMediaSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ClassMedia'}

ClassMediaListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/ClassMedia'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}

ClassMediaListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ClassMediaListData'}

ClassRecord:
  type: object
  additionalProperties: false
  required: [id, company, attendance, attendance_status, schedule, student, student_name, trainer, trainer_name, store, plan, class_date, theme, session_number, pose_sequence, trainer_notes, homework, completion_rating, improvement_tags, next_focus, status, media, created_at, updated_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company: {type: integer, format: int64, minimum: 1, readOnly: true}
    attendance: {type: integer, format: int64, minimum: 1, nullable: true, readOnly: true}
    attendance_status: {type: string, enum: [present, late, absent, leave], nullable: true, readOnly: true}
    schedule: {type: integer, format: int64, minimum: 1, nullable: true, readOnly: true}
    student: {type: integer, format: int64, minimum: 1, readOnly: true}
    student_name: {type: string, readOnly: true}
    trainer: {type: integer, format: int64, minimum: 1, readOnly: true}
    trainer_name: {type: string, readOnly: true}
    store: {type: integer, format: int64, minimum: 1, readOnly: true}
    plan: {type: integer, format: int64, minimum: 1, nullable: true}
    class_date: {type: string, format: date, readOnly: true}
    theme: {type: string, minLength: 1, maxLength: 200}
    session_number: {type: integer, minimum: 1, readOnly: true}
    pose_sequence: {$ref: '#/PoseSequence'}
    trainer_notes: {type: string, default: ''}
    homework: {type: string, default: ''}
    completion_rating: {type: integer, minimum: 1, maximum: 5, nullable: true}
    improvement_tags: {type: array, items: {type: string}}
    next_focus: {type: string, maxLength: 200, default: ''}
    status: {type: string, enum: [draft, completed], readOnly: true}
    media: {type: array, items: {$ref: '#/ClassMedia'}, readOnly: true}
    created_at: {type: string, format: date-time, readOnly: true}
    updated_at: {type: string, format: date-time, readOnly: true}

ClassRecordCreateRequest:
  type: object
  additionalProperties: false
  required: [attendance_id, theme, pose_sequence]
  properties:
    attendance_id: {type: integer, format: int64, minimum: 1}
    plan: {type: integer, format: int64, minimum: 1, nullable: true}
    theme: {type: string, minLength: 1, maxLength: 200}
    pose_sequence: {$ref: '#/PoseSequence'}
    trainer_notes: {type: string, default: ''}
    homework: {type: string, default: ''}
    completion_rating: {type: integer, minimum: 1, maximum: 5, nullable: true}
    improvement_tags: {type: array, items: {type: string}, default: []}
    next_focus: {type: string, maxLength: 200, default: ''}

ClassRecordUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    plan: {type: integer, format: int64, minimum: 1, nullable: true}
    theme: {type: string, minLength: 1, maxLength: 200}
    pose_sequence: {$ref: '#/PoseSequence'}
    trainer_notes: {type: string}
    homework: {type: string}
    completion_rating: {type: integer, minimum: 1, maximum: 5, nullable: true}
    improvement_tags: {type: array, items: {type: string}}
    next_focus: {type: string, maxLength: 200}

ClassRecordSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ClassRecord'}

ClassRecordListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/ClassRecord'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}

ClassRecordListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ClassRecordListData'}

BatchStudentOverride:
  type: object
  additionalProperties: false
  properties:
    completion_rating: {type: integer, minimum: 1, maximum: 5}
    trainer_notes: {type: string}
    improvement_tags: {type: array, items: {type: string}}
    homework: {type: string}

BatchClassRecordCommonData:
  type: object
  additionalProperties: false
  required: [theme, pose_sequence]
  properties:
    theme: {type: string, minLength: 1, maxLength: 200}
    pose_sequence: {$ref: '#/PoseSequence'}
    trainer_notes: {type: string, default: ''}
    homework: {type: string, default: ''}

BatchClassRecordRequest:
  type: object
  additionalProperties: false
  required: [schedule_id, common_data, student_overrides]
  properties:
    schedule_id: {type: integer, format: int64, minimum: 1}
    common_data: {$ref: '#/BatchClassRecordCommonData'}
    student_overrides:
      type: object
      additionalProperties: {$ref: '#/BatchStudentOverride'}

BatchClassRecordData:
  type: object
  additionalProperties: false
  required: [created_count, items]
  properties:
    created_count: {type: integer, minimum: 0}
    items: {type: array, items: {$ref: '#/ClassRecord'}}

BatchClassRecordSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/BatchClassRecordData'}

FileUploadData:
  type: object
  additionalProperties: false
  required: [file_url, thumbnail_url]
  properties:
    file_url: {type: string, format: uri}
    thumbnail_url: {type: string, description: Empty for videos.}

FileUploadSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/FileUploadData'}
