User:
  type: object
  additionalProperties: false
  required: [id, phone, name, role, avatar, company_id, store_id, is_active]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    phone: {type: string, pattern: '^1[3-9][0-9]{9}$'}
    name: {type: string, minLength: 1, maxLength: 100}
    role: {$ref: './common.yaml#/UserRole'}
    avatar: {type: string, format: uri, nullable: true}
    company_id: {type: integer, format: int64, minimum: 1, nullable: true}
    store_id: {type: integer, format: int64, minimum: 1, nullable: true}
    is_active: {type: boolean}
LoginRequest:
  type: object
  additionalProperties: false
  required: [phone, password]
  properties:
    phone: {type: string, pattern: '^1[3-9][0-9]{9}$'}
    password: {type: string, minLength: 1, writeOnly: true}
TokenData:
  type: object
  additionalProperties: false
  required: [access_token, refresh_token, token_type, expires_in, refresh_expires_in]
  properties:
    access_token: {type: string, writeOnly: true}
    refresh_token: {type: string, writeOnly: true}
    token_type: {type: string, enum: [Bearer]}
    expires_in: {type: integer, enum: [1800]}
    refresh_expires_in: {type: integer, enum: [604800]}
LoginData:
  type: object
  additionalProperties: false
  required: [access_token, refresh_token, token_type, expires_in, refresh_expires_in, user]
  properties:
    access_token: {type: string, writeOnly: true}
    refresh_token: {type: string, writeOnly: true}
    token_type: {type: string, enum: [Bearer]}
    expires_in: {type: integer, enum: [1800]}
    refresh_expires_in: {type: integer, enum: [604800]}
    user: {$ref: '#/User'}
LoginSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/LoginData'}
TokenRefreshRequest:
  type: object
  additionalProperties: false
  required: [refresh_token]
  properties: {refresh_token: {type: string, writeOnly: true}}
TokenRefreshSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/TokenData'}
LogoutRequest:
  type: object
  additionalProperties: false
  required: [refresh_token]
  properties: {refresh_token: {type: string, writeOnly: true}}
MeUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    avatar: {type: string, format: uri, nullable: true}
PasswordChangeRequest:
  type: object
  additionalProperties: false
  required: [old_password, new_password]
  properties:
    old_password: {type: string, minLength: 1, writeOnly: true}
    new_password: {type: string, minLength: 8, writeOnly: true, description: 同 Django 密码校验器规则}
UserSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/User'}
UserCreateRequest:
  type: object
  additionalProperties: false
  required: [phone, name, password, role]
  properties:
    phone: {type: string, pattern: '^1[3-9][0-9]{9}$'}
    name: {type: string, minLength: 1, maxLength: 100}
    password: {type: string, minLength: 8, writeOnly: true}
    role: {$ref: './common.yaml#/UserRole'}
    store_id: {type: integer, format: int64, minimum: 1, nullable: true}
    is_active: {type: boolean, default: true}
UserUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    role: {$ref: './common.yaml#/UserRole'}
    store_id: {type: integer, format: int64, minimum: 1, nullable: true}
    is_active: {type: boolean}
ResetPasswordRequest:
  type: object
  additionalProperties: false
  required: [new_password]
  properties: {new_password: {type: string, minLength: 8, writeOnly: true}}
UserListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/User'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}
UserListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/UserListData'}
