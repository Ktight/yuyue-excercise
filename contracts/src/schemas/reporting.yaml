ReportPersonSummary:
  type: object
  additionalProperties: false
  required: [id, name, avatar]
  properties:
    id:
      type: integer
      format: int64
      minimum: 1
      description: accounts.User primary key.
    name: {type: string}
    avatar: {type: string, format: uri, nullable: true}

ReportRatingPoint:
  type: object
  additionalProperties: false
  required: [date, class_record_id, rating]
  properties:
    date: {type: string, format: date}
    class_record_id: {type: integer, format: int64, minimum: 1}
    rating: {type: integer, minimum: 1, maximum: 5}

ReportBodyAssessment:
  type: object
  additionalProperties: false
  required:
    - id
    - date
    - height_cm
    - weight_kg
    - posture_spine
    - posture_pelvis
    - posture_shoulder
    - flexibility_score
    - core_strength_score
    - notes
  properties:
    id: {type: integer, format: int64, minimum: 1}
    date: {type: string, format: date}
    height_cm: {type: number, nullable: true}
    weight_kg: {type: number, nullable: true}
    posture_spine: {type: string}
    posture_pelvis: {type: string}
    posture_shoulder: {type: string}
    flexibility_score: {type: integer, minimum: 1, maximum: 10, nullable: true}
    core_strength_score: {type: integer, minimum: 1, maximum: 10, nullable: true}
    notes: {type: string}

ReportBodyChanges:
  type: object
  additionalProperties: false
  required: [height_cm, weight_kg, flexibility_score, core_strength_score]
  properties:
    height_cm: {type: number, nullable: true}
    weight_kg: {type: number, nullable: true}
    flexibility_score: {type: number, nullable: true}
    core_strength_score: {type: number, nullable: true}

ReportBodyComparison:
  type: object
  additionalProperties: false
  required: [before, after, changes, reason]
  properties:
    before:
      nullable: true
      allOf:
        - {$ref: '#/ReportBodyAssessment'}
    after:
      nullable: true
      allOf:
        - {$ref: '#/ReportBodyAssessment'}
    changes:
      nullable: true
      allOf:
        - {$ref: '#/ReportBodyChanges'}
    reason:
      type: string
      nullable: true
      enum: [NO_BODY_ASSESSMENTS, NO_BASELINE_ASSESSMENT, NO_END_ASSESSMENT, SINGLE_BODY_ASSESSMENT, null]

ReportFeedbackDistribution:
  type: object
  additionalProperties: false
  required: [easy, moderate, hard]
  properties:
    easy: {type: integer, minimum: 0}
    moderate: {type: integer, minimum: 0}
    hard: {type: integer, minimum: 0}

ReportFeedbackComment:
  type: object
  additionalProperties: false
  required: [date, class_record_id, improvement_note, comment]
  properties:
    date: {type: string, format: date}
    class_record_id: {type: integer, format: int64, minimum: 1}
    improvement_note: {type: string}
    comment: {type: string}

ReportFeedbackSummary:
  type: object
  additionalProperties: false
  required: [total, distribution, representative_comments, reason]
  properties:
    total: {type: integer, minimum: 0}
    distribution: {$ref: '#/ReportFeedbackDistribution'}
    representative_comments:
      type: array
      maxItems: 3
      items: {$ref: '#/ReportFeedbackComment'}
    reason:
      type: string
      nullable: true
      enum: [NO_FEEDBACK_DATA, null]

ReportTrainerComment:
  type: object
  additionalProperties: false
  required: [date, class_record_id, trainer_id, trainer_name, theme, comment]
  properties:
    date: {type: string, format: date}
    class_record_id: {type: integer, format: int64, minimum: 1}
    trainer_id: {type: integer, format: int64, minimum: 1}
    trainer_name: {type: string}
    theme: {type: string}
    comment: {type: string}

ReportTrainingPlan:
  type: object
  additionalProperties: false
  required:
    - id
    - title
    - status
    - start_date
    - end_date
    - target_frequency_per_week
    - focus_tags
    - total_sessions
    - completed_sessions
    - progress_percentage
  properties:
    id: {type: integer, format: int64, minimum: 1}
    title: {type: string}
    status: {type: string, enum: [active, completed, paused]}
    start_date: {type: string, format: date}
    end_date: {type: string, format: date}
    target_frequency_per_week: {type: integer, minimum: 1}
    focus_tags: {type: array, items: {type: string}}
    total_sessions: {type: integer, minimum: 0}
    completed_sessions: {type: integer, minimum: 0}
    progress_percentage: {type: number, minimum: 0, maximum: 100}

ReportPreview:
  type: object
  additionalProperties: false
  required:
    - student
    - trainer
    - range_start
    - range_end
    - generated_at
    - total_sessions
    - train_count
    - attendance_rate
    - average_rating
    - rating_trend
    - body_comparison
    - feedback_summary
    - trainer_comments
    - training_plan
    - data_notes
  properties:
    student: {$ref: '#/ReportPersonSummary'}
    trainer:
      nullable: true
      allOf:
        - {$ref: '#/ReportPersonSummary'}
    range_start: {type: string, format: date}
    range_end: {type: string, format: date}
    generated_at: {type: string, format: date-time}
    total_sessions:
      type: integer
      minimum: 0
      description: Completed ClassRecords in the inclusive report range.
    train_count:
      type: integer
      minimum: 0
      description: Compatibility alias of total_sessions for the Phase 10 preview UI.
    attendance_rate:
      type: number
      minimum: 0
      maximum: 1
      nullable: true
      description: Present or late attendances divided by active-booking attendance records in range; null when no attendance exists.
    average_rating:
      type: number
      minimum: 1
      maximum: 5
      nullable: true
      description: Mean ClassRecord completion rating; null when no ratings exist.
    rating_trend: {type: array, items: {$ref: '#/ReportRatingPoint'}}
    body_comparison: {$ref: '#/ReportBodyComparison'}
    feedback_summary: {$ref: '#/ReportFeedbackSummary'}
    trainer_comments: {type: array, items: {$ref: '#/ReportTrainerComment'}}
    training_plan:
      nullable: true
      allOf:
        - {$ref: '#/ReportTrainingPlan'}
    data_notes:
      type: array
      uniqueItems: true
      items:
        type: string
        enum:
          - NO_ATTENDANCE_DATA
          - NO_RATING_DATA
          - NO_FEEDBACK_DATA
          - NO_BODY_ASSESSMENTS
          - NO_BASELINE_ASSESSMENT
          - NO_END_ASSESSMENT
          - SINGLE_BODY_ASSESSMENT
          - NO_TRAINING_PLAN

ReportPreviewSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/ReportPreview'}

DashboardMetric:
  type: object
  additionalProperties: false
  required: [key, value, unit, range_start, range_end, updated_at]
  properties:
    key: {type: string}
    value: {type: string}
    unit: {type: string}
    range_start: {type: string, format: date}
    range_end: {type: string, format: date}
    updated_at: {type: string, format: date-time}

Reminder:
  type: object
  additionalProperties: false
  required: [id, company_id, type, severity, status, title, message, created_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1}
    type: {type: string, enum: [membership_expiring, inactive_student, class_record_draft, training_plan_overdue]}
    severity: {type: string, enum: [info, warning, critical]}
    status: {type: string, enum: [unread, read, dismissed]}
    title: {type: string}
    message: {type: string}
    created_at: {type: string, format: date-time, readOnly: true}
