Company:
  type: object
  additionalProperties: false
  required: [id, name, contact_person, contact_phone, contract_start, contract_end, status, created_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    name: {type: string, minLength: 1, maxLength: 100}
    contact_person: {type: string, minLength: 1, maxLength: 50}
    contact_phone: {type: string, minLength: 1, maxLength: 20}
    contract_start: {type: string, format: date}
    contract_end: {type: string, format: date}
    status: {$ref: './common.yaml#/ResourceStatus'}
    created_at: {type: string, format: date-time, readOnly: true}
CompanyCreateRequest:
  type: object
  additionalProperties: false
  required: [name, contact_person, contact_phone, contract_start, contract_end]
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    contact_person: {type: string, minLength: 1, maxLength: 50}
    contact_phone: {type: string, minLength: 1, maxLength: 20}
    contract_start: {type: string, format: date}
    contract_end: {type: string, format: date}
    status: {$ref: './common.yaml#/ResourceStatus'}
CompanyUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    contact_person: {type: string, minLength: 1, maxLength: 50}
    contact_phone: {type: string, minLength: 1, maxLength: 20}
    contract_start: {type: string, format: date}
    contract_end: {type: string, format: date}
    status: {$ref: './common.yaml#/ResourceStatus'}
CompanySuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Company'}
CompanyListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/Company'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}
CompanyListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/CompanyListData'}

Room:
  type: object
  additionalProperties: false
  required: [id, store, name, capacity, facilities, status]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    store: {type: integer, format: int64, minimum: 1}
    name: {type: string, minLength: 1, maxLength: 100}
    capacity: {type: integer, minimum: 1, default: 10}
    facilities:
      type: array
      nullable: true
      items: {type: string}
    status: {$ref: './common.yaml#/ResourceStatus'}
RoomCreateRequest:
  type: object
  additionalProperties: false
  required: [store, name]
  properties:
    store: {type: integer, format: int64, minimum: 1}
    name: {type: string, minLength: 1, maxLength: 100}
    capacity: {type: integer, minimum: 1, default: 10}
    facilities: {type: array, nullable: true, items: {type: string}}
    status: {$ref: './common.yaml#/ResourceStatus'}
RoomUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    store: {type: integer, format: int64, minimum: 1}
    name: {type: string, minLength: 1, maxLength: 100}
    capacity: {type: integer, minimum: 1}
    facilities: {type: array, nullable: true, items: {type: string}}
    status: {$ref: './common.yaml#/ResourceStatus'}
RoomSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Room'}
RoomListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/Room'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}
RoomListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/RoomListData'}

Store:
  type: object
  additionalProperties: false
  required: [id, company, name, address, phone, business_hours, status, created_at, rooms]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company: {type: integer, format: int64, minimum: 1, readOnly: true}
    name: {type: string, minLength: 1, maxLength: 100}
    address: {type: string, minLength: 1}
    phone: {type: string, minLength: 1, maxLength: 20}
    business_hours: {type: string, minLength: 1, maxLength: 50, example: '07:00-22:00'}
    status: {$ref: './common.yaml#/ResourceStatus'}
    created_at: {type: string, format: date-time, readOnly: true}
    rooms: {type: array, readOnly: true, items: {$ref: '#/Room'}}
StoreCreateRequest:
  type: object
  additionalProperties: false
  required: [name, address, phone, business_hours]
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    address: {type: string, minLength: 1}
    phone: {type: string, minLength: 1, maxLength: 20}
    business_hours: {type: string, minLength: 1, maxLength: 50}
    status: {$ref: './common.yaml#/ResourceStatus'}
StoreUpdateRequest:
  type: object
  additionalProperties: false
  minProperties: 1
  properties:
    name: {type: string, minLength: 1, maxLength: 100}
    address: {type: string, minLength: 1}
    phone: {type: string, minLength: 1, maxLength: 20}
    business_hours: {type: string, minLength: 1, maxLength: 50}
    status: {$ref: './common.yaml#/ResourceStatus'}
StoreSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/Store'}
StoreListData:
  type: object
  additionalProperties: false
  required: [items, page, page_size, total]
  properties:
    items: {type: array, items: {$ref: '#/Store'}}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1, maximum: 100}
    total: {type: integer, minimum: 0}
StoreListSuccessResponse:
  type: object
  additionalProperties: false
  required: [code, message, data]
  properties:
    code: {type: string, enum: [OK]}
    message: {type: string}
    data: {$ref: '#/StoreListData'}
