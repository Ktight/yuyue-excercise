Company:
  type: object
  additionalProperties: false
  required: [id, name, address, contact_name, contact_phone, status, created_at, updated_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    name: {type: string, minLength: 1, maxLength: 100}
    address: {type: string, maxLength: 255}
    contact_name: {type: string, maxLength: 100}
    contact_phone: {type: string, pattern: '^1[3-9][0-9]{9}$'}
    status: {$ref: './common.yaml#/ResourceStatus'}
    created_at: {type: string, format: date-time, readOnly: true}
    updated_at: {type: string, format: date-time, readOnly: true}
Store:
  type: object
  additionalProperties: false
  required: [id, company_id, name, address, status, created_at, updated_at]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1}
    name: {type: string, minLength: 1, maxLength: 100}
    address: {type: string, maxLength: 255}
    status: {$ref: './common.yaml#/ResourceStatus'}
    created_at: {type: string, format: date-time, readOnly: true}
    updated_at: {type: string, format: date-time, readOnly: true}
Room:
  type: object
  additionalProperties: false
  required: [id, company_id, store_id, name, capacity, description, status]
  properties:
    id: {type: integer, format: int64, minimum: 1, readOnly: true}
    company_id: {type: integer, format: int64, minimum: 1, readOnly: true}
    store_id: {type: integer, format: int64, minimum: 1}
    name: {type: string, minLength: 1, maxLength: 100}
    capacity: {type: integer, minimum: 1}
    description: {type: string, nullable: true}
    status: {$ref: './common.yaml#/ResourceStatus'}
