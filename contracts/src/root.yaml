openapi: 3.0.3
info:
  title: 瑜悦练 API
  version: 1.7.0
  description: Project API contract. CONTRACT_READY/API_READY modules may be integrated; DRAFT modules are design and Mock only. See status.json.
servers:
  - url: http://localhost:8000
    description: 本地开发
security:
  - BearerAuth: []
paths:
  $include: paths
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    $include: schemas
  parameters:
    PageParameter:
      name: page
      in: query
      schema: {type: integer, minimum: 1, default: 1}
    PageSizeParameter:
      name: page_size
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
    SearchParameter:
      name: search
      in: query
      schema: {type: string}
    OrderingParameter:
      name: ordering
      in: query
      schema: {type: string}
  responses:
    BadRequest: {$ref: './schemas/common.yaml#/BadRequest'}
    Unauthorized: {$ref: './schemas/common.yaml#/Unauthorized'}
    Forbidden: {$ref: './schemas/common.yaml#/Forbidden'}
    NotFound: {$ref: './schemas/common.yaml#/NotFound'}
    Conflict: {$ref: './schemas/common.yaml#/Conflict'}
    ServerError: {$ref: './schemas/common.yaml#/ServerError'}
