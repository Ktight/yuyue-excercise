/api/class-templates/:
  get:
    operationId: listClassTemplates
    tags: [class-templates]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Trainers see company-shared templates and their own personal templates. Administrators see company templates.
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
      - {name: scope, in: query, schema: {type: string, enum: [personal, company_shared]}}
      - {name: company_id, in: query, description: Super admin only., schema: {type: integer, minimum: 1}}
    responses:
      '200': {description: Class-template list, content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateListSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createClassTemplate
    tags: [class-templates]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    description: Company administrators create personal or company-shared templates for a trainer in the same company.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateCreateRequest'}}}
    responses:
      '201': {description: Class template created, content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}

/api/class-templates/{template_id}/:
  parameters:
    - {name: template_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveClassTemplate
    tags: [class-templates]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    responses:
      '200': {description: Class-template detail, content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateClassTemplate
    tags: [class-templates]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateUpdateRequest'}}}
    responses:
      '200': {description: Class template updated, content: {application/json: {schema: {$ref: '../schemas/courses.yaml#/ClassTemplateSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  delete:
    operationId: deleteClassTemplate
    tags: [class-templates]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    responses:
      '200': {description: Class template deleted, content: {application/json: {schema: {$ref: '../schemas/common.yaml#/EmptySuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
