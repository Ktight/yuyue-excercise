/api/bookings/:
  get:
    operationId: listBookings
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Students see their own bookings; trainers see bookings for their schedules; managers and company administrators see company bookings.
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
    responses:
      '200': {description: Booking list, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingListSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createBooking
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Student self-booking or staff proxy booking using schedule_id and optional student_id.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingCreateRequest'}}}
    responses:
      '201': {description: Booking created, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/bookings/{booking_id}/:
  parameters:
    - {name: booking_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveBooking
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    responses:
      '200': {description: Booking detail, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}

/api/bookings/{booking_id}/cancel/:
  parameters:
    - {name: booking_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  delete:
    operationId: cancelBooking
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Cancels an active booking. Students may cancel only their own; trainers only bookings for their schedules. Count-card use is restored once.
    responses:
      '200': {description: Booking cancelled, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
