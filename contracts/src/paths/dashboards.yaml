/api/dashboards/admin/:
  get:
    operationId: getDashboardsAdmin
    tags:
    - dashboards
    x-status: DRAFT
    x-roles:
    - super_admin
    - company_admin
    - store_manager
    - trainer
    x-tenant-scope: company
    description: DRAFT：字段、权限边界和关键业务决策需在对应阶段冻结后方可联调。
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/DraftListSuccessResponse
      '400':
        $ref: ../schemas/common.yaml#/BadRequest
      '401':
        $ref: ../schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../schemas/common.yaml#/Forbidden
      '404':
        $ref: ../schemas/common.yaml#/NotFound
      '409':
        $ref: ../schemas/common.yaml#/Conflict
      '500':
        $ref: ../schemas/common.yaml#/ServerError
