/api/dashboards/admin/:
  get:
    operationId: getAdminDashboard
    tags: [dashboards]
    x-status: API_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: global-or-company-store
    description: >-
      Returns the management dashboard in Asia/Shanghai. Super administrators
      see global data, company administrators see their company, and store
      managers see only their assigned store. Trainer and student dashboards
      are explicitly deferred.
    responses:
      '200':
        description: Management dashboard snapshot.
        content:
          application/json:
            schema:
              $ref: ../schemas/analytics.yaml#/AdminDashboardSuccessResponse
      '401': {$ref: ../schemas/common.yaml#/Unauthorized}
      '403': {$ref: ../schemas/common.yaml#/Forbidden}
      '500': {$ref: ../schemas/common.yaml#/ServerError}
