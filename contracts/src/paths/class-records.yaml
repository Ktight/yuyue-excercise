/api/class-records/:
  get:
    operationId: listClassRecords
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Company-scoped history ordered by newest class date. Only super admins may select company_id.
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
      - {name: student_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: trainer_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: date_from, in: query, schema: {type: string, format: date}}
      - {name: date_to, in: query, schema: {type: string, format: date}}
      - {name: date_range, in: query, description: Comma-separated inclusive start and end dates., schema: {type: string, example: '2026-07-01,2026-07-31'}}
      - {name: company_id, in: query, description: Super admin only., schema: {type: integer, minimum: 1}}
    responses:
      '200': {description: Class-record history, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordListSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createClassRecord
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: Creates one draft record from a present/late attendance owned by the authenticated trainer.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordCreateRequest'}}}
    responses:
      '201': {description: Class record created, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/class-records/{record_id}/:
  parameters:
    - {name: record_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveClassRecord
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    responses:
      '200': {description: Class-record detail, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateClassRecord
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: The owning trainer may edit a draft record. Completed records are immutable.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordUpdateRequest'}}}
    responses:
      '200': {description: Class record updated, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/class-records/{record_id}/complete/:
  parameters:
    - {name: record_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  post:
    operationId: completeClassRecord
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: The owning trainer transitions a draft record to completed. Repeating the action returns conflict.
    responses:
      '200': {description: Class record completed, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassRecordSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/training/batch-records/:
  post:
    operationId: batchCreateClassRecords
    tags: [class-records]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: Atomically creates records for every present/late attendance in the trainer's schedule. Student overrides replace common values.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/records.yaml#/BatchClassRecordRequest'}}}
    responses:
      '201': {description: Batch created, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/BatchClassRecordSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
