/api/reminders/:
  get:
    operationId: listReminders
    tags: [reminders]
    x-status: API_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: global-or-company-store-and-user-state
    description: >-
      Lists current derived reminders for the authenticated management user.
      Dismissed reminders are excluded. Filtering is applied before pagination.
      The read may idempotently materialize per-user state; repeated reads do
      not change response semantics or counts.
    parameters:
      - {$ref: ../root.yaml#/components/parameters/PageParameter}
      - {$ref: ../root.yaml#/components/parameters/PageSizeParameter}
      - name: unread_only
        in: query
        required: false
        description: Return only reminders whose per-user state is unread.
        schema: {type: boolean, default: false}
    responses:
      '200':
        description: Paginated reminders ordered by priority, creation time and ID.
        content:
          application/json:
            schema:
              $ref: ../schemas/analytics.yaml#/ReminderListSuccessResponse
      '400': {$ref: ../schemas/common.yaml#/BadRequest}
      '401': {$ref: ../schemas/common.yaml#/Unauthorized}
      '403': {$ref: ../schemas/common.yaml#/Forbidden}
      '500': {$ref: ../schemas/common.yaml#/ServerError}

/api/reminders/{reminder_id}/read/:
  parameters:
    - name: reminder_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
  post:
    operationId: markReminderRead
    tags: [reminders]
    x-status: API_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: global-or-company-store-and-user-state
    description: >-
      Idempotently marks one current reminder as read. Missing, expired or
      another user's reminder is hidden behind the same 404 response.
    requestBody:
      required: false
      content:
        application/json:
          schema: {$ref: ../schemas/analytics.yaml#/ReminderActionRequest}
    responses:
      '200':
        description: Complete updated reminder.
        content:
          application/json:
            schema: {$ref: ../schemas/analytics.yaml#/ReminderSuccessResponse}
      '401': {$ref: ../schemas/common.yaml#/Unauthorized}
      '403': {$ref: ../schemas/common.yaml#/Forbidden}
      '404': {$ref: ../schemas/common.yaml#/NotFound}
      '500': {$ref: ../schemas/common.yaml#/ServerError}

/api/reminders/{reminder_id}/dismiss/:
  parameters:
    - name: reminder_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
  post:
    operationId: dismissReminder
    tags: [reminders]
    x-status: API_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: global-or-company-store-and-user-state
    description: >-
      Idempotently dismisses one current reminder. Dismiss is one-way in
      version 1.9.0. Missing, expired or another user's reminder is hidden
      behind the same 404 response.
    requestBody:
      required: false
      content:
        application/json:
          schema: {$ref: ../schemas/analytics.yaml#/ReminderActionRequest}
    responses:
      '200':
        description: Complete updated reminder.
        content:
          application/json:
            schema: {$ref: ../schemas/analytics.yaml#/ReminderSuccessResponse}
      '401': {$ref: ../schemas/common.yaml#/Unauthorized}
      '403': {$ref: ../schemas/common.yaml#/Forbidden}
      '404': {$ref: ../schemas/common.yaml#/NotFound}
      '500': {$ref: ../schemas/common.yaml#/ServerError}
