/api/companies/:
  get:
    operationId: listCompanies
    tags: [companies]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company_or_global
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
    responses:
      '200': {description: 公司列表, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanyListSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createCompany
    tags: [companies]
    x-status: CONTRACT_READY
    x-roles: [super_admin]
    x-tenant-scope: global
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanyCreateRequest'}}}
    responses:
      '201': {description: 公司已创建, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanySuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
/api/companies/{company_id}/:
  parameters:
    - name: company_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
  get:
    operationId: retrieveCompany
    tags: [companies]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company_or_global
    responses:
      '200': {description: 公司详情, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanySuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateCompany
    tags: [companies]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company_or_global
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanyUpdateRequest'}}}
    responses:
      '200': {description: 公司已更新, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/CompanySuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  delete:
    operationId: deleteCompany
    tags: [companies]
    x-status: CONTRACT_READY
    x-roles: [super_admin]
    x-tenant-scope: global
    responses:
      '204': {description: 公司已删除}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
