/api/rooms/:
  get:
    operationId: listRooms
    tags: [rooms]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: role_based
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
    responses:
      '200': {description: 场地列表, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomListSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createRoom
    tags: [rooms]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: role_based
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomCreateRequest'}}}
    responses:
      '201': {description: 场地已创建, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
/api/rooms/{room_id}/:
  parameters:
    - name: room_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
  get:
    operationId: retrieveRoom
    tags: [rooms]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: role_based
    responses:
      '200': {description: 场地详情, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateRoom
    tags: [rooms]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: role_based
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomUpdateRequest'}}}
    responses:
      '200': {description: 场地已更新, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/RoomSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  delete:
    operationId: deleteRoom
    tags: [rooms]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: role_based
    responses:
      '204': {description: 场地已删除}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
