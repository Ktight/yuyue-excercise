/api/students/:
  get:
    operationId: listStudents
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Super admins see all tenants; company admins see their company; store managers see their store; trainers see only students assigned as primary_trainer. Historical attendance expansion is deferred.
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
      - {$ref: '../root.yaml#/components/parameters/SearchParameter'}
      - {$ref: '../root.yaml#/components/parameters/OrderingParameter'}
      - {name: status, in: query, schema: {$ref: '../schemas/common.yaml#/ResourceStatus'}}
      - {name: membership_status, in: query, schema: {type: string, enum: [valid, expired, insufficient]}}
      - {name: store_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: trainer_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: expiring_days, in: query, schema: {type: integer, minimum: 0}}
    responses:
      '200': {description: Student list, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentListSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createStudent
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Atomically creates a role=student User and StudentProfile. Company is derived from the token. Phone is globally unique. Trainers are automatically assigned when primary_trainer is omitted.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentCreateRequest'}}}
    responses:
      '201': {description: Created, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
/api/students/{student_id}/:
  parameters:
    - {name: student_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveStudent
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Cross-tenant or out-of-role-scope access is hidden as 404. Sensitive fields are available only on this staff-only endpoint and must never be logged in error payloads.
    responses:
      '200': {description: Detail, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateStudent
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Health/profile fields may be updated by visible staff. Only super/company admins may transfer stores or reassign trainers. Membership fields use the membership endpoint.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentUpdateRequest'}}}
    responses:
      '200': {description: Updated, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
/api/students/{student_id}/membership/:
  parameters:
    - {name: student_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveStudentMembership
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    responses:
      '200': {description: Membership, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/MembershipSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateStudentMembership
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: company
    description: Status is computed, not submitted. Count cards use remaining_count; stored cards use balance_minor. Renewal, payment and consumption ledgers are outside Phase 5.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/students.yaml#/MembershipUpdateRequest'}}}
    responses:
      '200': {description: Updated, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/MembershipSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
/api/students/{student_id}/eligibility/:
  parameters:
    - {name: student_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveStudentEligibility
    tags: [students]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Current general membership eligibility only; no schedule/store parameters are evaluated in Phase 5.
    responses:
      '200': {description: Eligibility, content: {application/json: {schema: {$ref: '../schemas/students.yaml#/StudentEligibilitySuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
