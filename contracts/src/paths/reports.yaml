/api/reports/:
  get:
    operationId: previewStudentReport
    tags: [reports]
    x-status: API_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company-store-trainer-or-self
    description: Computes a live, non-persistent report preview for an inclusive date range. Student IDs are accounts.User IDs. Phase 10 does not save, publish, export or share reports.
    parameters:
      - {name: student_id, in: query, required: true, description: accounts.User primary key., schema: {type: integer, format: int64, minimum: 1}}
      - {name: start, in: query, required: true, description: Inclusive range start., schema: {type: string, format: date}}
      - {name: end, in: query, required: true, description: Inclusive range end; cannot be in the future and the inclusive range cannot exceed 366 calendar days., schema: {type: string, format: date}}
    responses:
      '200': {description: Live report preview., content: {application/json: {schema: {$ref: '../schemas/reporting.yaml#/ReportPreviewSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
