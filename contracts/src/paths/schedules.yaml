/api/schedules/:
  get:
    operationId: listSchedules
    tags: [schedules]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Company-scoped schedules with active booking counts. Student requests are server-filtered to published, future, before-deadline schedules with remaining capacity, valid membership, no time conflict and no previous booking by the authenticated student. Personal booking status is intentionally read from GET /api/bookings/ and is not duplicated here.
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
      - {name: date_from, in: query, schema: {type: string, format: date}}
      - {name: date_to, in: query, schema: {type: string, format: date}}
      - {name: store_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: trainer_id, in: query, schema: {type: integer, minimum: 1}}
      - {name: course_type, in: query, schema: {type: string, enum: [private, small_group, group]}}
      - {name: status, in: query, schema: {type: string, enum: [published, cancelled, completed]}}
      - {name: company_id, in: query, description: Super admin only; other roles receive 403 for another tenant., schema: {type: integer, minimum: 1}}
    responses:
      '200': {description: Schedule list, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleListSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createSchedule
    tags: [schedules]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager]
    x-tenant-scope: company
    description: Creates one schedule, or all ISO weekdays across the requested number of weeks when schedule_mode=recurring. The operation is atomic.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleCreateRequest'}}}
    responses:
      '201': {description: Single schedule or recurring creation count, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleCreateSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/schedules/{schedule_id}/:
  parameters:
    - {name: schedule_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveSchedule
    tags: [schedules]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Staff may retrieve any visible company schedule. Students may retrieve only schedules that satisfy the same discovery rules as the list endpoint.
    responses:
      '200': {description: Schedule detail, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateSchedule
    tags: [schedules]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleUpdateRequest'}}}
    responses:
      '200': {description: Updated schedule, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
  delete:
    operationId: deleteSchedule
    tags: [schedules]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    responses:
      '200': {description: Deleted, content: {application/json: {schema: {$ref: '../schemas/common.yaml#/EmptySuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}

/api/schedules/{schedule_id}/book/:
  parameters:
    - {name: schedule_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  post:
    operationId: bookSchedule
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Student self-booking or staff proxy booking. Validates publication, deadline, capacity, student time conflicts, and membership; count cards consume one use atomically.
    requestBody:
      required: false
      content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/ScheduleBookingCreateRequest'}}}
    responses:
      '201': {description: Booking created, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}

/api/schedules/{schedule_id}/bookings/{booking_id}/:
  parameters:
    - {name: schedule_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
    - {name: booking_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  delete:
    operationId: cancelScheduleBooking
    tags: [bookings]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer, student]
    x-tenant-scope: company
    description: Cancels an active booking and restores one use when the current membership is a count card.
    responses:
      '200': {description: Booking cancelled, content: {application/json: {schema: {$ref: '../schemas/scheduling.yaml#/BookingSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
