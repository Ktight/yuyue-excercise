/api/stores/:
  get:
    operationId: listStores
    tags: [stores]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
    responses:
      '200': {description: 门店列表, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreListSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
  post:
    operationId: createStore
    tags: [stores]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreCreateRequest'}}}
    responses:
      '201': {description: 门店已创建, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '409': {$ref: '../schemas/common.yaml#/Conflict'}
/api/stores/{store_id}/:
  parameters:
    - name: store_id
      in: path
      required: true
      schema: {type: integer, format: int64, minimum: 1}
  get:
    operationId: retrieveStore
    tags: [stores]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    responses:
      '200': {description: 门店详情, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateStore
    tags: [stores]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreUpdateRequest'}}}
    responses:
      '200': {description: 门店已更新, content: {application/json: {schema: {$ref: '../schemas/organization.yaml#/StoreSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  delete:
    operationId: deleteStore
    tags: [stores]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin]
    x-tenant-scope: company
    responses:
      '204': {description: 门店已删除}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
