/api/upload/:
  post:
    operationId: uploadClassMediaFile
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    description: Saves an image or video up to 10MB. Images receive a JPEG thumbnail bounded to 300x300 pixels.
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            additionalProperties: false
            required: [file]
            properties:
              file: {type: string, format: binary}
              media_type: {type: string, enum: [image, video], description: Optional when inferable from MIME type.}
    responses:
      '201': {description: File stored, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/FileUploadSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}

/api/class-records/{record_id}/media/:
  parameters:
    - {name: record_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: listClassMedia
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    parameters:
      - {$ref: '../root.yaml#/components/parameters/PageParameter'}
      - {$ref: '../root.yaml#/components/parameters/PageSizeParameter'}
    responses:
      '200': {description: Class media list, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaListSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  post:
    operationId: createClassMedia
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: The owning trainer attaches a previously uploaded file URL to a class record.
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaCreateRequest'}}}
    responses:
      '201': {description: Media attached, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}

/api/class-records/{record_id}/media/{media_id}/:
  parameters:
    - {name: record_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
    - {name: media_id, in: path, required: true, schema: {type: integer, format: int64, minimum: 1}}
  get:
    operationId: retrieveClassMedia
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [super_admin, company_admin, store_manager, trainer]
    x-tenant-scope: company
    responses:
      '200': {description: Media detail, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaSuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  patch:
    operationId: updateClassMedia
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaUpdateRequest'}}}
    responses:
      '200': {description: Media updated, content: {application/json: {schema: {$ref: '../schemas/records.yaml#/ClassMediaSuccessResponse'}}}}
      '400': {$ref: '../schemas/common.yaml#/BadRequest'}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
  delete:
    operationId: deleteClassMedia
    tags: [class-media]
    x-status: CONTRACT_READY
    x-roles: [trainer]
    x-tenant-scope: company
    description: Deletes the media metadata row. Uploaded-file lifecycle cleanup is deferred to the configured storage backend.
    responses:
      '200': {description: Media deleted, content: {application/json: {schema: {$ref: '../schemas/common.yaml#/EmptySuccessResponse'}}}}
      '401': {$ref: '../schemas/common.yaml#/Unauthorized'}
      '403': {$ref: '../schemas/common.yaml#/Forbidden'}
      '404': {$ref: '../schemas/common.yaml#/NotFound'}
