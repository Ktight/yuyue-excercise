  /api/body-assessments/:
    get:
      operationId: listBodyAssessments
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      - name: student_id
        in: query
        schema:
          type: integer
          minimum: 1
      - name: ordering
        in: query
        schema:
          type: string
          enum:
          - assess_date
          - -assess_date
          default: -assess_date
      responses:
        '200':
          description: Assessment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createBodyAssessment
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Trainers may create only for assigned students; managers for their store; admins for their company. Photos
        are read-only and uploads are deferred.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodyAssessmentCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
