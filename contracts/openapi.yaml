      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      x-tenant-scope: company
      description: Physical delete is restricted to administrators. Phase 5 has no audit-log model; clients must confirm explicitly
        and no sensitive content may enter logs. Audit retention is required before broadening this operation.
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
