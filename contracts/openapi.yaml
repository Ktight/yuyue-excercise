      - store_id
      - name
      - capacity
      - description
      - status
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        company_id:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        store_id:
          type: integer
          format: int64
