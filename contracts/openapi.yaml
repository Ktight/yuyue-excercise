          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
