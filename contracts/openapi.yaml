      description: DRAFT：字段、权限边界和关键业务决策需在对应阶段冻结后方可联调。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/users/:
    get:
      operationId: usersList
      tags:
      - Users
      x-status: DRAFT
      x-roles:
      - super_admin
      - company_admin
      x-tenant-scope: company
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      - $ref: '#/components/parameters/SearchParameter'
      - name: role
        in: query
        schema:
          $ref: '#/components/schemas/UserRole'
      - name: is_active
        in: query
        schema:
          type: boolean
      - name: store_id
        in: query
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: ordering
        in: query
        schema:
          type: string
          enum:
          - name
          - -name
          - id
          - -id
          default: id
      responses:
        '200':
          description: 分页用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      operationId: usersCreate
      tags:
      - Users
      x-status: DRAFT
      x-roles:
      - super_admin
      - company_admin
      x-tenant-scope: company
      description: company_id 由服务端权限范围确定；store_manager 必须有 store_id，trainer 可选，其余角色禁止非空 store_id。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/users/{user_id}/:
    parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: usersRetrieve
      tags:
      - Users
      x-status: DRAFT
      x-roles:
      - super_admin
      - company_admin
      x-tenant-scope: company
      responses:
        '200':
          description: 用户详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
