      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SearchParameter:
      name: search
      in: query
      schema:
        type: string
    OrderingParameter:
      name: ordering
      in: query
      schema:
        type: string
  responses:
    ServerError:
      description: 内部错误，不泄露 traceback 或配置
      content: &id001
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: 请求参数或业务校验失败
      content: *id001
    Forbidden:
      description: 权限不足
      content: *id001
    Unauthorized:
      description: 未认证或令牌无效
      content: *id001
    NotFound:
      description: 资源不存在或为避免跨租户枚举而隐藏
      content: *id001
    Conflict:
      description: 唯一性或资源状态冲突
      content: *id001
