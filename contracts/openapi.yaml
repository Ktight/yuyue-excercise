    CompanySummary:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
    StoreSummary:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
    RoomSummary:
