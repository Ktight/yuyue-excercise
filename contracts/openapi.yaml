  /api/training-plans/:
    get:
      operationId: listTrainingPlans
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Company-scoped plans ordered by newest creation time. Trainers see only plans they created; only super
        admins may select company_id.
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      - name: student_id
        in: query
        description: StudentProfile primary key.
        schema:
          type: integer
          minimum: 1
      - name: trainer_id
        in: query
        schema:
          type: integer
          minimum: 1
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - completed
          - paused
      - name: company_id
        in: query
        description: Super admin only.
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Training-plan list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: Creates a trainer-owned plan. Company and trainer are inferred from the authenticated user. A student may
        have at most one active plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingPlanCreateRequest'
      responses:
        '201':
          description: Training plan created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/training-plans/{plan_id}/:
    parameters:
    - name: plan_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Returns plan progress and a paginated linked-record collection. Trainers can retrieve only their own plans.
      parameters:
      - name: linked_records_page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: linked_records_page_size
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Training-plan detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanDetailSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: Only the trainer who created the plan may update it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingPlanUpdateRequest'
      responses:
        '200':
          description: Training plan updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: Deletes a trainer-owned plan. Existing ClassRecords are retained and unlinked through the nullable foreign
        key.
      responses:
        '200':
          description: Training plan deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/training-plans/{plan_id}/complete/:
    parameters:
    - name: plan_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    post:
      operationId: completeTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: The owning trainer changes an active or paused plan to completed. Repeating the action returns conflict.
      responses:
        '200':
          description: Training plan completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/training-plans/{plan_id}/pause/:
    parameters:
    - name: plan_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    post:
      operationId: pauseTrainingPlan
      tags:
      - training-plans
      x-status: API_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: The owning trainer changes an active plan to paused. Completed or already-paused plans return conflict.
      responses:
        '200':
          description: Training plan paused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
