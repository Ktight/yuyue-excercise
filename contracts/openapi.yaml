openapi: 3.0.3
info:
  title: 瑜悦练 API
  version: 1.7.0
  description: Project API contract. CONTRACT_READY/API_READY modules may be integrated; DRAFT modules are design and Mock
    only. See status.json.
servers:
- url: http://localhost:8000
  description: 本地开发
security:
- BearerAuth: []
paths:
  /api/attendances/:
    get:
      operationId: listAttendances
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Company-scoped attendance list. Students see only their own records.
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      - name: schedule_id
        in: query
        schema:
          type: integer
          minimum: 1
      - name: company_id
        in: query
        description: Super admin only.
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Attendance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/attendances/{attendance_id}/:
    parameters:
    - name: attendance_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveAttendance
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Students may retrieve only their own attendance records.
      responses:
        '200':
          description: Attendance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/attendances/{attendance_id}/check-in/:
    parameters:
    - name: attendance_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    post:
      operationId: checkInAttendance
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Students may check in only themselves. Check-in at or before schedule start is present; later check-in
        is late.
      responses:
        '200':
          description: Checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/attendances/batch-check-in/:
    post:
      operationId: batchCheckInAttendances
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Atomically checks in selected students for one schedule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceBatchCheckInRequest'
      responses:
        '200':
          description: Batch checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceBatchSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/attendances/{attendance_id}/mark-leave/:
    parameters:
    - name: attendance_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    post:
      operationId: markAttendanceLeave
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      responses:
        '200':
          description: Marked as leave
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/attendances/auto-create/:
    post:
      operationId: autoCreateAttendances
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Idempotently creates absent attendance rows for active bookings in one schedule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceScheduleRequest'
      responses:
        '200':
          description: Creation count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceAutoCreateSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/attendances/stats/:
    get:
      operationId: getAttendanceStats
      tags:
      - attendance
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: At least one dimension is required. Students may request only their own student dimension and cannot request
        course statistics.
      parameters:
      - name: student_id
        in: query
        description: accounts.User primary key, not StudentProfile ID.
        schema:
          type: integer
          minimum: 1
      - name: schedule_id
        in: query
        schema:
          type: integer
          minimum: 1
      responses:
        '200':
          description: Student and/or course statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceStatsSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/auth/login/:
    post:
      operationId: authLogin
      tags:
      - Authentication
      security: []
      x-status: API_READY
      x-roles:
      - public
      x-tenant-scope: none
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/refresh/:
    post:
      operationId: authRefresh
      tags:
      - Authentication
      security: []
      x-status: API_READY
      x-roles:
      - public
      x-tenant-scope: none
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: 轮换成功，旧 Refresh Token 立即失效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/logout/:
    post:
      operationId: authLogout
      tags:
      - Authentication
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: self
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Refresh Token 已撤销
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/me/:
    get:
      operationId: authGetMe
      tags:
      - Authentication
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: self
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      operationId: authUpdateMe
      tags:
      - Authentication
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: self
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeUpdateRequest'
      responses:
        '200':
          description: 更新后的当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/change-password/:
    post:
      operationId: authChangePassword
      tags:
      - Authentication
      x-status: API_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: self
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: 密码修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/body-assessments/:
    get:
      operationId: listBodyAssessments
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      - name: student_id
        in: query
        schema:
          type: integer
          minimum: 1
      - name: ordering
        in: query
        schema:
          type: string
          enum:
          - assess_date
          - -assess_date
          default: -assess_date
      responses:
        '200':
          description: Assessment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createBodyAssessment
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Trainers may create only for assigned students; managers for their store; admins for their company. Photos
        are read-only and uploads are deferred.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodyAssessmentCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/body-assessments/{assessment_id}/:
    parameters:
    - name: assessment_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveBodyAssessment
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      responses:
        '200':
          description: Detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateBodyAssessment
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BodyAssessmentUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteBodyAssessment
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      x-tenant-scope: company
      description: Physical delete is restricted to administrators. Phase 5 has no audit-log model; clients must confirm explicitly
        and no sensitive content may enter logs. Audit retention is required before broadening this operation.
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/students/{student_id}/body-assessment-trend/:
    parameters:
    - name: student_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveBodyAssessmentTrend
      tags:
      - body-assessments
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      parameters:
      - name: metric
        in: query
        schema:
          type: string
          enum:
          - height
          - weight
          - flexibility_score
          - core_strength_score
          default: weight
      - name: date_from
        in: query
        schema:
          type: string
          format: date
      - name: date_to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Trend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyAssessmentTrendSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/bookings/:
    get:
      operationId: listBookings
      tags:
      - bookings
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Students see their own bookings; trainers see bookings for their schedules; managers and company administrators
        see company bookings.
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createBooking
      tags:
      - bookings
      x-status: CONTRACT_READY
      x-roles:
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Student self-booking or staff proxy booking using schedule_id and optional student_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/bookings/{booking_id}/:
    parameters:
    - name: booking_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveBooking
      tags:
      - bookings
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      responses:
        '200':
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/bookings/{booking_id}/cancel/:
    parameters:
    - name: booking_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    delete:
      operationId: cancelBooking
      tags:
      - bookings
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
      x-tenant-scope: company
      description: Cancels an active booking. Students may cancel only their own; trainers only bookings for their schedules.
        Count-card use is restored once.
      responses:
        '200':
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/upload/:
    post:
      operationId: uploadClassMediaFile
      tags:
      - class-media
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      description: Saves an image or video up to 10MB. Images receive a JPEG thumbnail bounded to 300x300 pixels.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                media_type:
                  type: string
                  enum:
                  - image
                  - video
                  description: Optional when inferable from MIME type.
      responses:
        '201':
          description: File stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/class-records/{record_id}/media/:
    parameters:
    - name: record_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: listClassMedia
      tags:
      - class-media
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      parameters:
      - $ref: '#/components/parameters/PageParameter'
      - $ref: '#/components/parameters/PageSizeParameter'
      responses:
        '200':
          description: Class media list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassMediaListSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createClassMedia
      tags:
      - class-media
      x-status: CONTRACT_READY
      x-roles:
      - trainer
      x-tenant-scope: company
      description: The owning trainer attaches a previously uploaded file URL to a class record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassMediaCreateRequest'
      responses:
        '201':
          description: Media attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassMediaSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/class-records/{record_id}/media/{media_id}/:
    parameters:
    - name: record_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    - name: media_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    get:
      operationId: retrieveClassMedia
      tags:
      - class-media
      x-status: CONTRACT_READY
      x-roles:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      x-tenant-scope: company
      responses:
        '200':
          description: Media detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassMediaSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateClassMedia
      tags:
      - class-media
