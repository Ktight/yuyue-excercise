components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      additionalProperties: false
      required:
      - id
      - phone
      - name
      - role
      - avatar
      - company_id
      - store_id
      - is_active
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          readOnly: true
        phone:
          type: string
          pattern: ^1[3-9][0-9]{9}$
        name:
          type: string
          minLength: 1
          maxLength: 100
        role:
          $ref: '#/components/schemas/UserRole'
        avatar:
          type: string
          format: uri
          nullable: true
        company_id:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        store_id:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        is_active:
          type: boolean
    LoginRequest:
      type: object
      additionalProperties: false
      required:
      - phone
      - password
      properties:
        phone:
          type: string
          pattern: ^1[3-9][0-9]{9}$
        password:
          type: string
          minLength: 1
          writeOnly: true
    TokenData:
      type: object
      additionalProperties: false
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in
      - refresh_expires_in
      properties:
        access_token:
          type: string
          writeOnly: true
        refresh_token:
          type: string
          writeOnly: true
        token_type:
          type: string
          enum:
          - Bearer
        expires_in:
          type: integer
          enum:
          - 1800
        refresh_expires_in:
          type: integer
          enum:
          - 604800
    LoginData:
      type: object
      additionalProperties: false
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in
      - refresh_expires_in
      - user
      properties:
        access_token:
          type: string
          writeOnly: true
        refresh_token:
          type: string
          writeOnly: true
        token_type:
          type: string
          enum:
          - Bearer
        expires_in:
          type: integer
          enum:
          - 1800
        refresh_expires_in:
          type: integer
          enum:
          - 604800
        user:
          $ref: '#/components/schemas/User'
    LoginSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginData'
    TokenRefreshRequest:
      type: object
      additionalProperties: false
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
          writeOnly: true
    TokenRefreshSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/TokenData'
    LogoutRequest:
      type: object
      additionalProperties: false
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
          writeOnly: true
    MeUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        avatar:
          type: string
          format: uri
          nullable: true
    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required:
      - old_password
      - new_password
      properties:
        old_password:
          type: string
          minLength: 1
          writeOnly: true
        new_password:
          type: string
          minLength: 8
          writeOnly: true
          description: 同 Django 密码校验器规则
    UserSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/User'
    UserCreateRequest:
      type: object
      additionalProperties: false
      required:
      - phone
      - name
      - password
      - role
      properties:
        phone:
          type: string
          pattern: ^1[3-9][0-9]{9}$
        name:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 8
          writeOnly: true
        role:
          $ref: '#/components/schemas/UserRole'
        store_id:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        is_active:
          type: boolean
          default: true
    UserUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        role:
          $ref: '#/components/schemas/UserRole'
        store_id:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        is_active:
          type: boolean
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required:
      - new_password
      properties:
        new_password:
          type: string
          minLength: 8
          writeOnly: true
    UserListData:
      type: object
      additionalProperties: false
      required:
      - items
      - page
      - page_size
      - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
    UserListSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserListData'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - errors
      - request_id
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        request_id:
          type: string
          pattern: ^req_[A-Za-z0-9_-]+$
    ErrorCode:
      type: string
      enum:
      - VALIDATION_ERROR
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - CONFLICT
      - RATE_LIMITED
      - INTERNAL_ERROR
      - API_ERROR
      - INVALID_CREDENTIALS
      - ACCOUNT_DISABLED
      - REFRESH_TOKEN_INVALID
      - OLD_PASSWORD_INCORRECT
      - PHONE_ALREADY_EXISTS
      - USER_NOT_FOUND
      - STORE_NOT_FOUND
      - STORE_REQUIRED_FOR_ROLE
      - STORE_NOT_ALLOWED_FOR_ROLE
      - CROSS_TENANT_ACCESS_DENIED
      - COURSE_TEMPLATE_NAME_CONFLICT
      - PRIVATE_CAPACITY_INVALID
      - STUDENT_PHONE_ALREADY_EXISTS
      - STUDENT_STORE_INVALID
      - STUDENT_TRAINER_INVALID
      - MEMBERSHIP_COMBINATION_INVALID
      - ASSESSMENT_VALUE_INVALID
      - ASSESSMENT_DATE_IN_FUTURE
      - MEDIA_UPLOAD_DEFERRED
      - SCHEDULE_TIME_CONFLICT
      - ROOM_TIME_CONFLICT
      - TRAINER_TIME_CONFLICT
      - SCHEDULE_NOT_BOOKABLE
      - BOOKING_CAPACITY_FULL
      - BOOKING_ALREADY_EXISTS
      - MEMBERSHIP_EXPIRED
      - MEMBERSHIP_BALANCE_INSUFFICIENT
      - BOOKING_CANCELLATION_DEADLINE_PASSED
      - ATTENDANCE_ALREADY_RECORDED
      - ATTENDANCE_TOO_EARLY
      - CLASS_RECORD_ALREADY_COMPLETED
      - CLASS_RECORD_EDIT_FORBIDDEN
      - BULK_OPERATION_FAILED
      - FILE_TYPE_NOT_ALLOWED
      - FILE_TOO_LARGE
      - UPLOAD_NOT_COMPLETED
      - REPORT_NOT_READY
      - EXPORT_IN_PROGRESS
      - SHARE_LINK_EXPIRED
      - SHARE_LINK_REVOKED
    EmptySuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          nullable: true
    Health:
      type: object
      additionalProperties: false
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - healthy
    HealthSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/Health'
    DraftResource:
      type: object
      description: DRAFT 模块的资源结构由对应领域 Schema 细化；冻结前禁止真实联调。
      additionalProperties: true
    DraftWriteRequest:
      type: object
      description: DRAFT 请求骨架；冻结时必须替换为模块专用 Create/Update Request。
      additionalProperties: false
    DraftSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/DraftResource'
    DraftListData:
      type: object
      additionalProperties: false
      required:
      - items
      - page
      - page_size
      - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DraftResource'
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
    DraftListSuccessResponse:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - data
      properties:
        code:
          type: string
          enum:
          - OK
        message:
          type: string
        data:
          $ref: '#/components/schemas/DraftListData'
    PaginationMeta:
      type: object
      additionalProperties: false
      required:
      - page
      - page_size
      - total
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
    Id:
      type: integer
      format: int64
      minimum: 1
    Money:
      type: string
      pattern: ^[0-9]+(\.[0-9]{1,2})?$
    ResourceStatus:
      type: string
      enum:
      - active
      - inactive
    UserRole:
      type: string
      enum:
      - super_admin
      - company_admin
      - store_manager
      - trainer
      - student
    Gender:
      type: string
      enum:
      - male
      - female
    UserSummary:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
    CompanySummary:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
    StoreSummary:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
